version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: foreman-postgres
    environment:
      POSTGRES_USER: foreman
      POSTGRES_PASSWORD: foreman
      POSTGRES_DB: foreman
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: foreman-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: